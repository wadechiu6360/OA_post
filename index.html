<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>強品圖片製作器</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #f2efeb;
  color: #3d3d3d;
  font-family:
    "Noto Sans CJK TC",
    "Noto Sans TC",
    "Microsoft JhengHei",
    sans-serif;
}

.app {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 330px 1fr;
}

.sidebar {
  padding: 28px 24px;
  background: #fffdfb;
  border-right: 1px solid #e7dfd8;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 30px;
}

h1 {
  font-size: 26px;
  line-height: 1.35;
  margin: 8px 0 12px;
}

.intro {
  color: #777;
  font-size: 13px;
  line-height: 1.7;
}

.section {
  border-top: 1px solid #e7dfd8;
  margin-top: 22px;
  padding-top: 18px;
}

.section h2 {
  font-size: 12px;
  letter-spacing: .12em;
  margin: 0 0 13px;
}

.field {
  margin: 12px 0;
}

.field label {
  font-size: 12px;
  display: block;
  margin-bottom: 6px;
}

input[type="text"] {
  width: 100%;
  height: 40px;
  border: 1px solid #ded6ce;
  border-radius: 8px;
  padding: 0 10px;
  font: inherit;
  background: #fff;
}

.upload {
  border: 1px dashed #d7cbc1;
  border-radius: 13px;
  background: #fff;
  padding: 20px;
  text-align: center;
  margin-top: 22px;
  cursor: pointer;
}

.upload input {
  display: none;
}

.upload strong {
  display: block;
  color: #f04b2f;
  font-size: 28px;
  margin-bottom: 5px;
}

.upload small {
  display: block;
  color: #999;
  margin-top: 5px;
  font-size: 11px;
}

.file-name {
  color: #f04b2f;
  font-size: 11px;
  margin-top: 8px;
  word-break: break-all;
}

input[type="range"] {
  width: 100%;
  accent-color: #f04b2f;
}

.hint {
  color: #999;
  font-size: 11px;
  line-height: 1.6;
}

.buttons {
  display: flex;
  gap: 8px;
  margin-top: 24px;
}

button {
  border: 0;
  border-radius: 9px;
  height: 43px;
  padding: 0 15px;
  cursor: pointer;
  font: inherit;
}

.reset {
  background: #eee8e2;
}

.download {
  flex: 1;
  background: #222;
  color: #fff;
}

.main {
  padding: 38px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.preview {
  width: min(100%, 720px);
}

.preview-title {
  display: flex;
  justify-content: space-between;
  margin-bottom: 14px;
}

.preview-title span {
  color: #999;
  font-size: 11px;
}

.card {
  padding: 18px;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 18px 50px #62472b18;
}

.canvas-wrap {
  width: 100%;
  aspect-ratio: 4 / 5;
  overflow: hidden;
  border-radius: 12px;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
}

.note {
  margin-top: 10px;
  color: #999;
  font-size: 11px;
  text-align: right;
}

@media (max-width: 800px) {
  .app {
    display: block;
  }

  .sidebar {
    border-right: 0;
    border-bottom: 1px solid #e7dfd8;
  }

  .main {
    padding: 20px 12px 35px;
  }
}
</style>
</head>

<body>

<div class="app">

  <aside class="sidebar">

    <div class="logo">
      強品圖片製作器
    </div>

    <h1>
      上傳圖片，<br>
      改字就能出圖。
    </h1>

    <p class="intro">
      上傳 PNG 商品圖片，修改文字後下載 JPG 圖片。
    </p>

    <label class="upload">
      <strong>＋</strong>
      上傳 PNG 商品圖片
      <small>建議使用透明背景 PNG</small>

      <input
        id="productFile"
        type="file"
        accept="image/png"
      >

      <div id="fileName" class="file-name"></div>
    </label>

    <div class="section">
      <h2>文字內容</h2>

      <div class="field">
        <label>主標題</label>
        <input
          id="headline"
          type="text"
          value="運動男女必收好物！"
        >
      </div>

      <div class="field">
        <label>品牌／商品名</label>
        <input
          id="brand"
          type="text"
          value="DR.WU"
        >
      </div>

      <div class="field">
        <label>開賣時間</label>
        <input
          id="date"
          type="text"
          value="7/25 00:00 限量開搶"
        >
      </div>

      <div class="field">
        <label>底部描述</label>
        <input
          id="description"
          type="text"
          value="輕透水感物理防曬液"
        >
      </div>
    </div>

    <div class="section">
      <h2>圖片調整</h2>

      <label>
        圖片大小　
        <span id="zoomText">100%</span>
      </label>

      <input
        id="zoom"
        type="range"
        min="50"
        max="160"
        value="100"
      >

      <p class="hint">
        可直接在右側預覽圖上拖曳商品圖片。
      </p>
    </div>

    <div class="buttons">
      <button class="reset" id="reset">
        重設
      </button>

      <button class="download" id="download">
        下載 JPG ↓
      </button>
    </div>

  </aside>

  <main class="main">

    <div class="preview">

      <div class="preview-title">
        <b>即時預覽</b>
        <span>1080 × 1350 px · JPG</span>
      </div>

      <div class="card">
        <div class="canvas-wrap">
          <canvas
            id="canvas"
            width="1080"
            height="1350"
          ></canvas>
        </div>

        <div class="note">
          拖曳商品圖片調整位置
        </div>
      </div>

    </div>

  </main>

</div>

<script>
const $ = id => document.getElementById(id);

const canvas = $("canvas");
const ctx = canvas.getContext("2d");

const FONT =
  '"Noto Sans CJK TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif';

const backgroundImage = new Image();
const productImage = new Image();

let productLoaded = false;

let scale = 1;

let position = {
  x: 540,
  y: 680
};

let dragging = false;
let lastPoint = null;

backgroundImage.src = "background.png";

backgroundImage.onload = () => {
  render();
};

function drawBackground() {
  if (backgroundImage.complete && backgroundImage.naturalWidth > 0) {
    ctx.drawImage(
      backgroundImage,
      0,
      0,
      canvas.width,
      canvas.height
    );
  } else {
    ctx.fillStyle = "#f34b2e";
    ctx.fillRect(0, 0, 1080, 1350);
  }
}

function drawProduct() {
  if (!productLoaded) return;

  const maxSize = 620;

  const ratio =
    Math.min(
      maxSize / productImage.width,
      maxSize / productImage.height
    ) * scale;

  const width = productImage.width * ratio;
  const height = productImage.height * ratio;

  ctx.save();

  ctx.shadowColor = "#0004";
  ctx.shadowBlur = 28;
  ctx.shadowOffsetY = 15;

  ctx.drawImage(
    productImage,
    position.x - width / 2,
    position.y - height / 2,
    width,
    height
  );

  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, 1080, 1350);

  drawBackground();
  drawProduct();

  ctx.textAlign = "center";

  ctx.fillStyle = "#3d3d3d";
  ctx.font = `800 58px ${FONT}`;
  ctx.fillText(
    $("headline").value,
    540,
    168
  );

  ctx.fillStyle = "#ce3634";
  ctx.font = `800 70px ${FONT}`;
  ctx.fillText(
    $("brand").value,
    540,
    258
  );

  ctx.fillStyle = "#080808";
  ctx.font = `700 46px ${FONT}`;
  ctx.fillText(
    $("date").value,
    540,
    330
  );

  ctx.fillStyle = "#777";
  ctx.font = `800 48px ${FONT}`;
  ctx.fillText(
    $("description").value,
    540,
    1065
  );

  ctx.textAlign = "start";
}

$("productFile").addEventListener("change", event => {
  const file = event.target.files[0];

  if (!file) return;

  const url = URL.createObjectURL(file);

  productImage.onload = () => {
    productLoaded = true;
    position = {
      x: 540,
      y: 680
    };

    $("fileName").textContent = file.name;

    render();

    URL.revokeObjectURL(url);
  };

  productImage.src = url;
});

[
  "headline",
  "brand",
  "date",
  "description"
].forEach(id => {
  $(id).addEventListener("input", render);
});

$("zoom").addEventListener("input", event => {
  scale = Number(event.target.value) / 100;
  $("zoomText").textContent = event.target.value + "%";
  render();
});

function getCanvasPoint(event) {
  const rect = canvas.getBoundingClientRect();

  return {
    x: (event.clientX - rect.left) * 1080 / rect.width,
    y: (event.clientY - rect.top) * 1350 / rect.height
  };
}

canvas.addEventListener("pointerdown", event => {
  if (!productLoaded) return;

  dragging = true;
  lastPoint = getCanvasPoint(event);

  canvas.setPointerCapture(event.pointerId);
});

canvas.addEventListener("pointermove", event => {
  if (!dragging) return;

  const point = getCanvasPoint(event);

  position.x += point.x - lastPoint.x;
  position.y += point.y - lastPoint.y;

  lastPoint = point;

  render();
});

canvas.addEventListener("pointerup", () => {
  dragging = false;
});

$("reset").addEventListener("click", () => {
  scale = 1;

  position = {
    x: 540,
    y: 680
  };

  $("zoom").value = 100;
  $("zoomText").textContent = "100%";

  render();
});

$("download").addEventListener("click", () => {
  const link = document.createElement("a");

  link.download = "強品圖片-" + Date.now() + ".jpg";

  link.href = canvas.toDataURL(
    "image/jpeg",
    0.92
  );

  link.click();
});

render();
</script>

</body>
</html>
